<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: white;
            color: black;
        }

        .bandeira {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .titulo {
            font-size: 3em;
            margin: 20px 0;
            padding: 10px 30px;
            border: 3px solid black;
            border-radius: 10px;
            background-color: #f0f0f0;
        }

        .card {
            border: 2px solid #ccc;
            padding: 15px;
            width: 280px;
            margin-top: 20px;
            border-radius: 10px;
        }

        button {
            font-size: 18px;
            cursor: pointer;
            margin: 5px;
        }
    </style>
</head>

<body>

    <div class="bandeira">

        <h2 class="titulo">Meu primeiro post</h2>

        <p>Vou compartilhar sobre candidatos à Presidência da República.</p>

        <p><strong>Joias Do Prado</strong></p>

        <p>
            Os candidatos à Presidência da República costumam apresentar propostas voltadas para áreas como economia,
            saúde, educação, segurança pública e geração de empregos.
        </p>

        <!-- LULA -->
        <div class="card">
            <h3>Lula</h3>
            <button id="lulaUpBtn" onclick="votar('lulaUpBtn', 'lulaUp')">
                👍 <span id="lulaUp">0</span>
            </button>

            <button id="lulaDownBtn" onclick="votar('lulaDownBtn', 'lulaDown')">
                👎 <span id="lulaDown">0</span>
            </button>
        </div>

        <!-- BOLSONARO -->
        <div class="card">
            <h3>Bolsonaro</h3>
            <button id="bolsoUpBtn" onclick="votar('bolsoUpBtn', 'bolsoUp')">
                👍 <span id="bolsoUp">0</span>
            </button>

            <button id="bolsoDownBtn" onclick="votar('bolsoDownBtn', 'bolsoDown')">
                👎 <span id="bolsoDown">0</span>
            </button>
        </div>

        <!-- MARINA -->
        <div class="card">
            <h3>Marina Silva</h3>
            <button id="marinaUpBtn" onclick="votar('marinaUpBtn', 'marinaUp')">
                👍 <span id="marinaUp">0</span>
            </button>

            <button id="marinaDownBtn" onclick="votar('marinaDownBtn', 'marinaDown')">
                👎 <span id="marinaDown">0</span>
            </button>
        </div>

    </div>

    <script>
        const votos = {}; // controla quem já votou

        function votar(btnId, spanId) {
            if (votos[btnId]) return; // já clicou → bloqueia

            const el = document.getElementById(spanId);
            el.textContent = Number(el.textContent) + 1;

            votos[btnId] = true; // marca como usado
        }
    </script>

</body>

</html>
