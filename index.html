<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eleitores Famosos</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: white;
            color: black;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            gap: 20px;
        }

        .titulo {
            font-size: 2.5em;
            border: 3px solid black;
            padding: 10px 20px;
            border-radius: 10px;
            background: #f0f0f0;
        }

        .card {
            border: 2px solid #ccc;
            padding: 15px;
            width: 300px;
            border-radius: 10px;
            text-align: center;
        }

        .botoes {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            font-size: 18px;
            cursor: pointer;
            padding: 5px 10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1 class="titulo">Eleitores Famosos</h1>

        <!-- Pessoa 1 -->
        <div class="card">
            <h2>Lula</h2>
            <p>Ex-presidente do Brasil</p>

            <div class="botoes">
                <button onclick="votar('lulaUp')">👍 <span id="lulaUp">0</span></button>
                <button onclick="votar('lulaDown')">👎 <span id="lulaDown">0</span></button>
            </div>
        </div>

        <!-- Pessoa 2 -->
        <div class="card">
            <h2>Bolsonaro</h2>
            <p>Ex-presidente do Brasil</p>

            <div class="botoes">
                <button onclick="votar('bolsoUp')">👍 <span id="bolsoUp">0</span></button>
                <button onclick="votar('bolsoDown')">👎 <span id="bolsoDown">0</span></button>
            </div>
        </div>

        <!-- Pessoa 3 -->
        <div class="card">
            <h2>Marina Silva</h2>
            <p>Política brasileira</p>

            <div class="botoes">
                <button onclick="votar('marinaUp')">👍 <span id="marinaUp">0</span></button>
                <button onclick="votar('marinaDown')">👎 <span id="marinaDown">0</span></button>
            </div>
        </div>

    </div>

    <script>
        function votar(id) {
            const elemento = document.getElementById(id);
            elemento.textContent = Number(elemento.textContent) + 1;
        }
    </script>

</body>

</html>
