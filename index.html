<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Eleitores Famosos</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #fff;
        }

        .card {
            border: 2px solid black;
            width: 250px;
            margin: 20px auto;
            padding: 15px;
            border-radius: 10px;
        }

        button {
            font-size: 20px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>Eleitores Famosos</h1>

    <div class="card">
        <h2>Lula</h2>

        <button onclick="like('lulaLike')">👍 <span id="lulaLike">0</span></button>
        <button onclick="like('lulaDislike')">👎 <span id="lulaDislike">0</span></button>
    </div>

    <div class="card">
        <h2>Bolsonaro</h2>

        <button onclick="like('bolsoLike')">👍 <span id="bolsoLike">0</span></button>
        <button onclick="like('bolsoDislike')">👎 <span id="bolsoDislike">0</span></button>
    </div>

    <div class="card">
        <h2>Marina Silva</h2>

        <button onclick="like('marinaLike')">👍 <span id="marinaLike">0</span></button>
        <button onclick="like('marinaDislike')">👎 <span id="marinaDislike">0</span></button>
    </div>

    <script>
        function like(id) {
            const el = document.getElementById(id);
            el.textContent = Number(el.textContent) + 1;
        }
    </script>

</body>

</html>
